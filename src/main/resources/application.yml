spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tatakai}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # validate em produção (schema via migração); update no compose/dev contra Postgres novo
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  websocket:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-32-chars}
    expiration-ms: 86400000  # 24h
