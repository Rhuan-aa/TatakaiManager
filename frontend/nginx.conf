server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # env.js nunca deve ser cacheado (muda por ambiente em runtime)
    location = /env.js {
        add_header Cache-Control "no-store";
    }

    # SPA: qualquer rota desconhecida cai no index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
